name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  qualidade:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Testes
        run: npx vitest run

      - name: Build
        run: npm run build

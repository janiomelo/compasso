name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  qualidade:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Testes com cobertura
        run: npm run coverage

      - name: Validar cobertura minima (80%)
        run: |
          node -e "const fs=require('fs'); const caminho='coverage/coverage-summary.json'; if(!fs.existsSync(caminho)){console.error('Arquivo de resumo de cobertura nao encontrado: '+caminho); process.exit(1);} const resumo=JSON.parse(fs.readFileSync(caminho,'utf8')); const total=resumo.total; const minimo=80; const alvoFuturo=95; const metricas=['lines','functions','branches','statements']; const falhas=metricas.filter((m)=>!total[m] || total[m].pct < minimo); if(falhas.length){console.error('Cobertura abaixo de '+minimo+'%:'); falhas.forEach((m)=>console.error('- '+m+': '+(total[m]?.pct ?? 'n/a')+'%')); console.error('Meta futura: elevar o gate para '+alvoFuturo+'%.'); process.exit(1);} console.log('Cobertura global valida (>= '+minimo+'%). Meta futura: '+alvoFuturo+'%.');"

      - name: Build
        run: npm run build

      - name: Instalar Chromium para E2E
        run: npx playwright install --with-deps chromium

      - name: Testes E2E (Playwright)
        run: npm run test:e2e

      - name: Publicar artefatos E2E
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-e2e-playwright
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
